<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Настройки Pomo-manage</title>
    <link rel="stylesheet" href="../styles/index.css" />
    <link rel="stylesheet" href="../styles/settings.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />
    
    <script src="../scripts/script.js" defer></script>
    <script>
(function () {
  const savedMode = localStorage.getItem("pomo-mode");
  if (savedMode && savedMode !== "work") { // "work" — это тема по умолчанию, её добавлять не надо
    document.body.classList.add(`${savedMode}-theme`);
  }
})();
    </script>
    <script src="../scripts/settings.js" defer></script>
  </head>
  <body>
    <div class="header-container">
      <header class="header element">
        <a href="../index.html">
          <img src="../assets/logo.svg" alt="logo" class="logo" />
        </a>
        <a href="../index.html" class="button">Таймер</a>
        <a href="about.html" class="button">Информация</a>
        <a href="form.html" class="button" id="open-aside-header">Задачи</a>
        <a href="settings.html" class="button chosen">Настройки</a>
      </header>
    </div>
    <main class="main-container">
      <div class="main element">
        <h1 class="no-select">Настройки</h1>

        <form id="settings-form" class="settings-form">
          <div class="setting-item">
            <label>Работа (мин)</label>
            <input type="number" id="pref-work" min="1" max="60" />
          </div>

          <div class="setting-item">
            <label>Короткий перерыв</label>
            <input type="number" id="pref-short" min="1" max="30" />
          </div>

          <div class="setting-item">
            <label>Длинный перерыв</label>
            <input type="number" id="pref-long" min="1" max="60" />
          </div>

          <div class="setting-item checkbox-group">
            <label>Уведомления</label>
            <input type="checkbox" id="pref-notifications" />
          </div>

          <div class="settings-actions">
            <button type="submit" class="button">Сохранить</button>
            <a href="../index.html" class="button">Назад</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
